name: Build Flutter Web and Deploy to Vercel

# Fallback path in case Vercel's own build environment can't run
# `flutter build web` directly. This workflow builds the Flutter web app
# here, then deploys the prebuilt `build/web` output (plus /api) to Vercel
# using `vercel deploy --prebuilt`.
#
# Required repo secrets (ask the repo owner to add these):
#   VERCEL_TOKEN    - Vercel personal/team access token
#   VERCEL_ORG_ID   - from `vercel project ls` / project settings
#   VERCEL_PROJECT_ID - from project settings

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        run: flutter pub get

      - name: Build Flutter web
        run: flutter build web --release

      - name: Install Node deps for API
        run: npm install --omit=dev

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt output to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
